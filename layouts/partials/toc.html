{{- if .TableOfContents }}
<div class="toc">
  <details {{ if .Param "tocOpen" }}open{{ end }}>
    <summary accesskey="c" title="(Alt + C)" class="mb-1">
      <span class="details text-rose-500">{{- i18n "toc" | default "On this page" }}</span>
    </summary>
    <div class="inner">
      {{- .TableOfContents }}
    </div>
  </details>
</div>
{{- end }}
