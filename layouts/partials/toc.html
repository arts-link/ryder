{{- if .TableOfContents }}
<section class="aside-toc-group" aria-labelledby="aside-toc-title">
  <h2 id="aside-toc-title" class="aside-toc-heading">
    <i class="fa-solid fa-signs-post aside-toc-icon"></i>
    <span>{{- i18n "toc" | default "On this page" }}</span>
  </h2>
  <div class="aside-toc-links">
    {{- .TableOfContents }}
  </div>
</section>
{{- end }}
