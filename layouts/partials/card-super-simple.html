{{- $m := partial "utils/card-meta.html" . }}

<div itemscope="" itemtype="http://schema.org/Article" class="rounded-md {{ $m.headerStyle }}">
  <a itemprop="url" aria-label="{{ .Title }}" href="{{ $m.cardURL }}">
    <h2 itemprop="headline" class="text-2xl p-3">
      {{- if .Params.homeFeatureIcon }}
        <i class="{{ .Params.homeFeatureIcon }} mr-2 text-3xl"></i>
      {{- end }}
      {{ .Title }}
    </h2>
  </a>
</div>
