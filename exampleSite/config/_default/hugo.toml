# !!! exampleSite only — CI overrides this via --baseURL flag for GitHub Pages
baseURL = "https://example.org/"
languageCode= "en-us"
title= "The Ryder Theme"
theme= ["ryder"]
summaryLength = 15
enableRobotsTXT = true
copyright = "©️ Ryder Theme 2026"
enableEmoji = true
# enableGitInfo = true  # adds git commit links to footer; 40-50% slower on large sites

# !!! exampleSite only, you may need to delete the line: `themesDir: ../../` 
themesDir= "../../"
[pagination]
  pagerSize = 20
[params]
  description = 'A barebones Hugo theme built with TailwindCSS, Alpine.js, and Font Awesome. Practical defaults, no bloat.'
  # TODO: Add exampleSite analytics later under the arts-link account.
  tocOpen = true
  # enableDebugPanel = true
  # navbar_fixed = true
  excludedtags = ["sample","test","excluded"]
  showDate = true 
  showAuthor = true 
  showBreadCrumbs = true # defaults to true
  showDarkToggle = true # defaults to true
  showShareButtons = true # defaults to false
  showCardLinkOverlay = false # defaults to true
  showSummaryMeta = false # defaults to true
  showReadOn = true # defaults to false
  showHomeFeed = true # defaults to true 
  loadLeaflet = true # defaults to false
  og_image_default = 'images/ryder-theme-og.webp'
  homePageFeatureHeader = "Features"
  homePageFeedHeader = "Documentation"
  logo_firstWord = 'ryder'
  logo_lastWord = 'theme'
  logo_tagline = "FOR HUGO WEBSITES"
  logo_fontClass = 'font-titillium'
  repository = "https://github.com/arts-link/ryder"
  # articleBackgroundStyle = "bg-gradient-to-l from-blue-100 to-green-100"
  # featuredArticleBackgroundStyle = "bg-gradient-to-l from-yellow-200 to-lime-200"
  showPubDate = true
  # headerType = "-custom" # create layouts/partials/header-custom.html in your site
  # footerType = "-custom" # create layouts/partials/footer-custom.html in your site
  # menuType = "-custom" # create layouts/partials/menu-custom.html in your site
  # listCardType = "-custom" # create a matching card partial in your site
  # homeListCardType = "-custom"
  # homeFeatureListCardType = "-custom"

  # Content Security Policy — applied via <meta http-equiv="Content-Security-Policy">.
  # The theme ships with secure defaults. Extend per-directive as needed.
  # Set disabled = true if your hosting platform already sends a CSP HTTP header.
  [params.csp]
    # disabled = true
    # imgSrc    = "https:"                        # allow all HTTPS image sources (e.g. for external post images)
    # scriptSrc = "https://cdn.example.com"       # extra script hosts
    # styleSrc  = "https://cdn.example.com"       # extra style hosts
    # fontSrc   = "https://cdn.example.com"       # extra font hosts
    # connectSrc = "https://api.example.com"      # extra connect hosts
    frameSrc  = "https://www.youtube-nocookie.com https://www.youtube.com https://player.vimeo.com https://w.soundcloud.com"
    # extraDirectives = "worker-src 'none';"      # append any additional directives

  [params.shareButtons]
    networks = [ "x", "email", "reddit", "facebook" ]
    # size = "small" # small, medium, large
    # icon = "solid" # normal, solid, circle, solidcircle
    # buttonMargin = "0.2em" 

  [params.ogImageText]
    x = 50
    y = 430
    fontName = "TitilliumWeb-Regular"

  [params.author]
    email = 'you@example.com'
    name = 'Ben Strawbridge'

  [params.twClasses]
    headerBackgroundFrameOuter = "bg-gradient-to-r from-slate-900 to-slate-700 border-b border-fuchsia-600 text-neutral-100"
    headerBackgroundFrameInner = "h-[240px] sm:h-[400px] bg-cover bg-center sm:bg-[center_30%]"
    headerBackgroundImage = "images/hyder_theme_header.webp"

[[params.alphaAlert]]
  weight = 1
  alertType = "success"
  alertTitle = "Ryder Theme for Hugo"
  alertMessage = "This is the <b>exampleSite</b>. Learn more about the theme by checking out the README on <a href='https://github.com/arts-link/ryder' class='underline'>on github.com</a>."
  dismissable = true 
  alertIconClass = "fa-solid fa-camera-retro"

  [params.footer]
    tagCloud = true

# Example: Configure footer taxonomies (optional, defaults to showing nothing)
[[params.footer.taxonomies]]
  name = "tags"
  title = "Top Tags"
  minCount = 2

[[params.footer.taxonomies]]
  name = "categories"
  title = "Categories"
  minCount = 3

[menus]
[[menus.main]]
    name = 'Tags'
    pageRef = '/tags'
    parent = 'docs'
    weight = 9990
[[menus.footer]]
    name = 'File a Bug or Feature Request'
    url = 'https://github.com/arts-link/ryder/issues/new/choose'
    weight = 10
[[menus.footer]]
    name = 'Contact Us'
    pageRef = '/contact'
    weight = 10

[outputs]
  home = ["HTML", "RSS", "LLMSTxt"]

[module]
  [module.hugoVersion]
    extended = false
    min = "0.146.0"
  [[module.mounts]]
    source = "assets"
    target = "assets"

[build]
  writeStats = true
  [[build.cachebusters]]
    source = "(postcss|tailwind)\\.config\\.js"
    target = "css"
  [[build.cachebusters]]
    source = "assets/.*\\.(js|ts|jsx|tsx)"
    target = "js"
  [[build.cachebusters]]
    source = "assets/.*\\.(.*)$"
    target = "$1"
