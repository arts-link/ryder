name = 'ryder'
version = 'v0.2.0'
license = 'MIT'
licenselink = 'https://github.com/arts-link/ryder/LICENSE'
description = 'A fast, accessible Hugo theme built with TailwindCSS and Alpine.js. Ships with dark mode, responsive navigation with dropdowns, OpenGraph image generation, Leaflet maps, photo galleries, recipe schema, share buttons, customizable headers/footers, and a Content Security Policy meta tag. Built for blogs, portfolios, and small business sites — easily extended without modifying theme files.'
min_version = '0.146.0'

# The home page of the theme, where the source can be found
homepage = 'https://github.com/arts-link/ryder'

# If you have a running demo of the theme
demosite = 'https://arts-link.github.io/ryder'

# Taxonomy terms
tags = ['blog', 'portfolio', 'responsive', 'dark-mode', 'tailwindcss', 'alpinejs']

# If the theme has multiple authors
# authors = [
#   {name = 'Name of author', homepage = 'Website of author'},
#   {name = 'Name of author', homepage = 'Website of author'}
# ]

# If the theme has a single author
[author]
  name = 'Ben Strawbridge'
  homepage = 'benstrawbridge.com'

# If porting an existing theme
# [original]
#   author = 'Name of original author'
#   homepage = 'Website of original author'
#   repo = 'https://github.com/owner/repo'
